<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Продукты</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
background: #F7F4EF;
color: #1C1917;
min-height: 100vh;
padding: 36px 20px 80px;
}
.container { max-width: 520px; margin: 0 auto; }

header { margin-bottom: 28px; }
h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
h1 em { color: #3D6B4F; font-style: italic; }
header p { margin-top: 4px; font-size: 13px; color: #9C8F83; }

.input-area { position: relative; margin-bottom: 24px; }
.input-row { display: flex; gap: 8px; }
.input-row input {
flex: 1;
padding: 12px 16px;
border: 1.5px solid #C8BFB5;
border-radius: 12px;
font-size: 15px;
background: #fff;
color: #1C1917;
outline: none;
-webkit-appearance: none;
}
.input-row input:focus { border-color: #3D6B4F; }
.input-row input::placeholder { color: #9C8F83; }

.btn-add {
padding: 12px 20px;
border-radius: 12px;
border: none;
background-color: #3D6B4F;
color: #ffffff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}
.btn-add:active { background-color: #2f5340; }

.suggestions {
display: none;
position: absolute;
top: calc(100% + 4px);
left: 0; right: 70px;
background: #fff;
border: 1.5px solid #E4DDD3;
border-radius: 12px;
box-shadow: 0 4px 20px rgba(0,0,0,.1);
z-index: 100;
overflow: hidden;
}
.suggestion {
display: flex;
align-items: center;
gap: 8px;
padding: 11px 14px;
cursor: pointer;
font-size: 14px;
}
.suggestion:active { background: #F7F4EF; }
.suggestion + .suggestion { border-top: 1px solid #E4DDD3; }
.badge {
margin-left: auto;
font-size: 11px;
padding: 2px 8px;
border-radius: 20px;
flex-shrink: 0;
}
.badge-reuse { background: #EBF2EE; color: #3D6B4F; }
.badge-inlist { background: #EDE9E3; color: #9C8F83; }

.section { margin-bottom: 16px; }
.sec-head {
display: flex;
align-items: center;
gap: 9px;
padding: 0 2px;
margin-bottom: 8px;
}
.sec-icon { font-size: 18px; }
.sec-name { font-size: 14px; font-weight: 700; flex: 1; }
.sec-count {
font-size: 11px;
color: #9C8F83;
background: #EDE9E3;
padding: 2px 8px;
border-radius: 20px;
}
.sec-body {
background: #fff;
border: 1.5px solid #E4DDD3;
border-radius: 14px;
overflow: hidden;
}

.item {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 14px;
border-bottom: 1px solid #F0EBE4;
}
.item:last-child { border-bottom: none; }

/* Circular checkbox */
.cb-wrap {
position: relative;
width: 24px;
height: 24px;
flex-shrink: 0;
cursor: pointer;
}
.cb-wrap input {
position: absolute;
opacity: 0;
width: 0;
height: 0;
}
.cb-ring {
display: block;
width: 24px;
height: 24px;
border-radius: 50%;
border: 2px solid #9C8F83;
background: #fff;
position: relative;
}
.cb-wrap input:checked + .cb-ring {
background: #3D6B4F;
border-color: #3D6B4F;
}
.cb-wrap input:checked + .cb-ring::after {
content: ‘’;
position: absolute;
left: 6px;
top: 3px;
width: 7px;
height: 11px;
border: 2.5px solid #fff;
border-top: none;
border-left: none;
transform: rotate(45deg);
}

.item-name {
font-size: 15px;
flex: 1;
cursor: pointer;
-webkit-user-select: none;
user-select: none;
}
.item-name.done {
text-decoration: line-through;
color: #9C8F83;
}
.item.pending .item-name { color: #B0A89F; }
.item.pending .cb-ring { border-style: dashed; border-color: #C8BFB5; }

.item-del {
background: none;
border: none;
cursor: pointer;
color: #C8BFB5;
font-size: 20px;
padding: 0 2px;
line-height: 1;
flex-shrink: 0;
}
.item-del:active { color: #C0392B; }

@keyframes slideIn {
from { opacity: 0; transform: translateY(-5px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes flash {
0%, 100% { background: transparent; }
40%       { background: #EBF2EE; }
}
.animate-in { animation: slideIn .25s ease both; }
.flash { animation: flash .6s ease; }

.empty { text-align: center; padding: 52px 0; color: #9C8F83; }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; line-height: 1.6; }

#footer { text-align: center; margin-top: 8px; display: none; }
.btn-clear {
background: none;
border: none;
font-size: 13px;
color: #9C8F83;
cursor: pointer;
padding: 8px 12px;
}
</style>

</head>
<body>
<div class="container">
  <header>
    <h1>Мои <em>продукты</em></h1>
    <p>Добавь что купить — ИИ разложит по отделам</p>
  </header>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="inp" placeholder="Что купить?" autocomplete="off" autocorrect="off">
      <button class="btn-add" id="addBtn" type="button">Добавить</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div id="lists"></div>

  <div id="footer">
    <button class="btn-clear" type="button" onclick="clearAll()">Очистить всё</button>
  </div>
</div>

<script>
// REPLACE WITH YOUR NEW KEY after rotating at platform.openai.com/api-keys
var OPENAI_KEY = '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';

var CATS = [
  {id:'produce',   name:'Овощи и фрукты',    icon:'🥬'},
  {id:'dairy',     name:'Молочное и яйца',   icon:'🥛'},
  {id:'meat',      name:'Мясо и рыба',       icon:'🥩'},
  {id:'bakery',    name:'Хлеб и выпечка',    icon:'🍞'},
  {id:'frozen',    name:'Заморозка',          icon:'🧊'},
  {id:'drinks',    name:'Напитки',            icon:'🥤'},
  {id:'pantry',    name:'Бакалея и консервы', icon:'🫙'},
  {id:'snacks',    name:'Сладкое и снеки',   icon:'🍫'},
  {id:'spices',    name:'Специи и соусы',    icon:'🌶️'},
  {id:'household', name:'Бытовая химия',     icon:'🧹'},
  {id:'hygiene',   name:'Гигиена',           icon:'🧴'},
  {id:'other',     name:'Разное',            icon:'🛒'},
];

var items = [], history = [], uid = 0;

function load() {
  try {
    var s = localStorage.getItem('gr6');
    if (s) { var d = JSON.parse(s); items = d.items||[]; history = d.history||[]; uid = d.uid||0; }
  } catch(e) {}
  render();
}

function save() {
  try { localStorage.setItem('gr6', JSON.stringify({items:items, history:history, uid:uid})); } catch(e) {}
}

// Autocomplete
var inp = document.getElementById('inp');
inp.addEventListener('input', function() { updateSuggestions(inp.value); });
inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var v = inp.value.trim();
    if (v) { hideSuggestions(); v.split(/[,;]/).map(function(s){return s.trim();}).filter(Boolean).forEach(handleAdd); inp.value = ''; }
  }
  if (e.key === 'Escape') hideSuggestions();
});
document.getElementById('addBtn').addEventListener('click', function() {
  var v = inp.value.trim();
  if (v) { hideSuggestions(); v.split(/[,;]/).map(function(s){return s.trim();}).filter(Boolean).forEach(handleAdd); inp.value = ''; }
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.input-area')) hideSuggestions();
});

function updateSuggestions(val) {
  var box = document.getElementById('suggestions');
  if (!val) { box.style.display = 'none'; return; }
  var lv = val.toLowerCase();
  var matches = history.filter(function(h){ return h.name.toLowerCase().includes(lv); }).slice(0, 5);
  if (!matches.length) { box.style.display = 'none'; return; }
  box.innerHTML = matches.map(function(h) {
    var existing = items.find(function(i){ return i.name.toLowerCase() === h.name.toLowerCase(); });
    var badge = '';
    if (existing && existing.checked)  badge = '<span class="badge badge-reuse">↩ купить снова</span>';
    else if (existing && !existing.checked) badge = '<span class="badge badge-inlist">в списке</span>';
    return '<div class="suggestion" onclick="useSuggestion(\'' + h.name.replace(/'/g,"\\'") + '\')">' + h.name + badge + '</div>';
  }).join('');
  box.style.display = 'block';
}

function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; }

function useSuggestion(name) {
  inp.value = '';
  hideSuggestions();
  handleAdd(name);
}

// Add item
function handleAdd(name) {
  name = name.trim(); if (!name) return;
  var existing = items.find(function(i){ return i.name.toLowerCase() === name.toLowerCase(); });
  if (existing) {
    if (existing.checked) {
      existing.checked = false;
      existing.checkedAt = null;
      existing.addedAt = Date.now();
      save(); render();
      setTimeout(function() {
        var el = document.getElementById('item-' + existing.id);
        if (el) { el.classList.add('flash'); }
      }, 50);
    }
    return;
  }
  var item = {id: uid++, name: name, checked: false, catId: null, pending: true, addedAt: Date.now(), checkedAt: null};
  items.unshift(item);
  if (!history.find(function(h){ return h.name.toLowerCase() === name.toLowerCase(); })) {
    history.push({name: name, catId: null});
  }
  save(); render();
  classify(item);
}

// AI classify — one item at a time
function classify(item) {
  var catList = CATS.map(function(c){ return c.id + ': ' + c.name; }).join('\n');
  fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + OPENAI_KEY},
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [{role:'user', content: 'К какому отделу супермаркета относится продукт "' + item.name + '"?\nОтделы:\n' + catList + '\n\nВерни ТОЛЬКО id отдела одним словом без пробелов.'}],
      max_tokens: 10
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var raw = (data.choices[0].message.content || '').trim().toLowerCase().replace(/[^a-z]/g,'');
    var cat = CATS.find(function(c){ return c.id === raw; }) || CATS.find(function(c){ return c.id === 'other'; });
    var idx = items.findIndex(function(i){ return i.id === item.id; });
    if (idx !== -1) { items[idx].catId = cat.id; items[idx].pending = false; }
    var hi = history.find(function(h){ return h.name.toLowerCase() === item.name.toLowerCase(); });
    if (hi) hi.catId = cat.id;
    save();
    renderItemMove(item.id);
  })
  .catch(function() {
    var idx = items.findIndex(function(i){ return i.id === item.id; });
    if (idx !== -1) { items[idx].catId = 'other'; items[idx].pending = false; }
    save(); render();
  });
}

// Render helpers
function sortItems(arr) {
  var yes = arr.filter(function(i){ return !i.checked; }).sort(function(a,b){ return b.addedAt - a.addedAt; });
  var no  = arr.filter(function(i){ return  i.checked; }).sort(function(a,b){ return (a.checkedAt||0)-(b.checkedAt||0); });
  return yes.concat(no);
}

function renderItem(item, animIn) {
  return '<div class="item' + (item.pending?' pending':'') + (animIn?' animate-in':'') + '" id="item-' + item.id + '">'
    + '<label class="cb-wrap">'
    + '<input type="checkbox" data-id="' + item.id + '"' + (item.checked?' checked':'') + '>'
    + '<span class="cb-ring"></span>'
    + '</label>'
    + '<span class="item-name' + (item.checked?' done':'') + '" data-toggle="' + item.id + '">' + item.name + '</span>'
    + '<button class="item-del" type="button" data-del="' + item.id + '">×</button>'
    + '</div>';
}

function render(animId) {
  var lists = document.getElementById('lists');
  var pending = items.filter(function(i){ return i.pending; });
  var html = '';

  if (pending.length) {
    html += '<div class="section" id="sec-pending">'
      + '<div class="sec-head"><span class="sec-icon">⏳</span><span class="sec-name">Определяю…</span></div>'
      + '<div class="sec-body">' + sortItems(pending).map(function(i){ return renderItem(i,false); }).join('') + '</div>'
      + '</div>';
  }

  CATS.forEach(function(cat) {
    var ci = items.filter(function(i){ return !i.pending && i.catId === cat.id; });
    if (!ci.length) return;
    html += '<div class="section" id="sec-' + cat.id + '">'
      + '<div class="sec-head">'
      + '<span class="sec-icon">' + cat.icon + '</span>'
      + '<span class="sec-name">' + cat.name + '</span>'
      + '<span class="sec-count">' + ci.length + '</span>'
      + '</div>'
      + '<div class="sec-body">' + sortItems(ci).map(function(i){ return renderItem(i, animId===i.id); }).join('') + '</div>'
      + '</div>';
  });

  if (!items.length) {
    html = '<div class="empty"><div class="icon">🛒</div><p>Добавь первый продукт<br>и ИИ разложит по отделам</p></div>';
  }

  lists.innerHTML = html;
  document.getElementById('footer').style.display = items.length ? 'block' : 'none';
  wireEvents();
}

function renderItemMove(itemId) {
  var item = items.find(function(i){ return i.id === itemId; });
  if (!item) return;
  var pendingEl = document.getElementById('item-' + itemId);
  if (pendingEl) {
    pendingEl.style.transition = 'opacity .2s, transform .2s';
    pendingEl.style.opacity = '0';
    pendingEl.style.transform = 'translateY(-4px)';
  }
  setTimeout(function() {
    var remaining = items.filter(function(i){ return i.pending; });
    if (!remaining.length) {
      var ps = document.getElementById('sec-pending');
      if (ps) ps.remove();
    } else if (pendingEl) {
      pendingEl.remove();
    }

    var cat = CATS.find(function(c){ return c.id === item.catId; });
    if (!cat) return;
    var catItems = items.filter(function(i){ return i.catId === item.catId; });
    var secEl = document.getElementById('sec-' + item.catId);

    if (!secEl) {
      var div = document.createElement('div');
      div.className = 'section';
      div.id = 'sec-' + item.catId;
      div.innerHTML = '<div class="sec-head">'
        + '<span class="sec-icon">' + cat.icon + '</span>'
        + '<span class="sec-name">' + cat.name + '</span>'
        + '<span class="sec-count">1</span>'
        + '</div>'
        + '<div class="sec-body">' + renderItem(item, true) + '</div>';
      var catIndex = CATS.findIndex(function(c){ return c.id === item.catId; });
      var existing = document.querySelectorAll('.section[id^="sec-"]:not(#sec-pending)');
      var inserted = false;
      for (var i=0; i<existing.length; i++) {
        var elCatId = existing[i].id.replace('sec-','');
        var elIndex = CATS.findIndex(function(c){ return c.id === elCatId; });
        if (elIndex > catIndex) { existing[i].before(div); inserted = true; break; }
      }
      if (!inserted) document.getElementById('lists').appendChild(div);
    } else {
      secEl.querySelector('.sec-count').textContent = catItems.length;
      secEl.querySelector('.sec-body').innerHTML = sortItems(catItems).map(function(i){ return renderItem(i, i.id===itemId); }).join('');
    }
    document.getElementById('footer').style.display = 'block';
    wireEvents();
  }, 220);
}

function wireEvents() {
  document.querySelectorAll('.cb-wrap input').forEach(function(cb) {
    cb.addEventListener('change', function(){ toggleCheck(parseInt(cb.dataset.id)); });
  });
  document.querySelectorAll('[data-toggle]').forEach(function(el) {
    el.addEventListener('click', function(){ toggleCheck(parseInt(el.dataset.toggle)); });
  });
  document.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function(e){ e.stopPropagation(); deleteItem(parseInt(btn.dataset.del)); });
  });
}

function toggleCheck(id) {
  var item = items.find(function(i){ return i.id === id; });
  if (!item) return;
  item.checked = !item.checked;
  item.checkedAt = item.checked ? Date.now() : null;
  save();
  var cat = item.catId;
  if (cat) {
    var secEl = document.getElementById('sec-' + cat);
    if (secEl) {
      var ci = items.filter(function(i){ return i.catId === cat; });
      secEl.querySelector('.sec-body').innerHTML = sortItems(ci).map(function(i){ return renderItem(i,false); }).join('');
      wireEvents();
      return;
    }
  }
  render();
}

function deleteItem(id) {
  items = items.filter(function(i){ return i.id !== id; });
  save(); render();
}

function clearAll() {
  items = []; save(); render();
}

load();
</script>

</body>
</html>
