<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Продукты</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #F7F4EF; color: #1C1917;

input, button, select, textarea {

.container { max-width: 520px; margin: 0 auto; }
.app-header {
  display: -webkit-flex; display: flex;

.header-actions {

.btn-cat-settings:hover { border-color: #3D6B4F; background: #F7FAF8; }

.btn-tr-settings {
  padding: 6px 11px; min-width: 0;

.input-area { position: relative; margin-bottom: 24px; }
.input-row { display: -webkit-flex; display: flex; gap: 8px; }
.input-row input {
-webkit-flex: 1; flex: 1; padding: 12px 16px;
border: 1.5px solid #C8BFB5; border-radius: 12px;
font-size: 16px; background: #fff; color: #1C1917;

}

}

.item {

}

select.item-cat:focus {

select.item-cat:focus-visible {

}

.tr-modal-row {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  gap: 10px; margin-bottom: 14px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.tr-modal-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #3D6B4F; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; }
.tr-modal-row-select {
  display: block; margin-bottom: 0; cursor: default; font-weight: 600;
}
.tr-modal-label { font-size: 12px; color: #9C8F83; margin-bottom: 6px; display: block; font-weight: 600; }
.tr-modal-row-select select#translateLang {
  width: 100%; padding: 10px 12px; font-size: 15px; border-radius: 10px;

}
.tr-modal-row-select select#translateLang:focus { border-color: #3D6B4F; }

.cb-wrap { position: relative; width: 24px; height: 24px; -webkit-flex-shrink: 0; flex-shrink: 0; cursor: pointer; }
.cb-wrap input[type=checkbox] { position: absolute; opacity: 0; width: 0; height: 0; margin: 0; }
.cb-ring {
display: block; width: 24px; height: 24px; border-radius: 12px;
border: 2px solid #9C8F83; background: #fff; position: relative;
}
.cb-wrap input[type=checkbox]:checked + .cb-ring { background: #3D6B4F; border-color: #3D6B4F; }
.cb-wrap input[type=checkbox]:checked + .cb-ring:after {
content: ''; position: absolute; left: 6px; top: 3px;
width: 7px; height: 11px;
border-right: 2.5px solid #fff; border-bottom: 2.5px solid #fff;
-webkit-transform: rotate(45deg); transform: rotate(45deg);

.item-name { font-size: 15px; -webkit-flex: 1; flex: 1; cursor: pointer; -webkit-user-select: none; user-select: none; }
.item-name.done { text-decoration: line-through; color: #9C8F83; }
.item.pending .item-name { color: #B0A89F; }
.item.pending .cb-ring { border-style: dashed; border-color: #C8BFB5; }
.item-del {
  display: -webkit-flex; display: flex;

  -webkit-justify-content: center; justify-content: center;

  background: none; border: none; border-radius: 6px;
  cursor: pointer;
  color: #C8BFB5; font-size: 20px; line-height: 1;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}

@-webkit-keyframes slideIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; } to { opacity: 1; } }
.animate-in { -webkit-animation: slideIn .3s ease both; animation: slideIn .3s ease both; }

.empty { text-align: center; padding: 52px 0; color: #9C8F83; }

.btn-clear { background: none; border: none; font-size: 13px; color: #9C8F83; cursor: pointer; padding: 8px 12px; }

.cat-modal {
  position: fixed; inset: 0; z-index: 300;
  display: -webkit-flex; display: flex;

  -webkit-justify-content: center; justify-content: center;

  -webkit-transition: opacity .2s ease, visibility .2s ease;

  position: relative; z-index: 1; width: 100%; max-width: 480px; max-height: min(88vh, 640px);

<body>
<div class="container">
  <header class="app-header">
    <div class="header-text">
      <h1>Мои <span>продукты</span></h1>
    </div>
    <div class="header-actions">
      <button type="button" class="btn-cat-settings" id="openCatSettingsBtn" aria-haspopup="dialog" aria-expanded="false" aria-controls="catModal">Категории</button>
      <button type="button" class="btn-tr-settings" id="openTranslateSettingsBtn" aria-haspopup="dialog" aria-expanded="false" aria-controls="translateModal">
        <span class="btn-tr-line1">Перевод</span>
        <span class="btn-tr-line2" id="translateStatusBadge">выкл</span>
      </button>
    </div>
  </header>
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="inp" placeholder="Что купить?" autocomplete="off" autocorrect="off" autocapitalize="sentences">
      <button class="btn-add" id="addBtn" type="button">Добавить</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>
  <div id="lists"></div>
  <div id="footer">
    <button class="btn-clear" type="button" id="clearBtn">Очистить всё</button>
  </div>

  <div id="catModal" class="cat-modal" aria-hidden="true" role="presentation">
    <div class="cat-modal-backdrop" id="catModalBackdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="cat-modal-panel" role="dialog" aria-modal="true" aria-labelledby="catModalTitle" id="catModalPanel">
      <div class="cat-modal-head">
        <h2 id="catModalTitle">Категории</h2>
        <button type="button" class="cat-modal-close" id="closeCatSettingsBtn" aria-label="Закрыть">&times;</button>
      </div>
      <div class="cat-modal-body">
        <p class="cat-settings-hint">Название и эмодзи уходят в ИИ. Справа — id отдела (латиница), его подставляет модель при ответе.</p>
        <div class="sec-body" id="catEditor"></div>
        <button type="button" class="btn-add-cat" id="addCatBtn">Добавить категорию</button>
      </div>
    </div>
  </div>

  <div id="translateModal" class="tr-modal" aria-hidden="true" role="presentation">
    <div class="tr-modal-backdrop" id="translateModalBackdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="tr-modal-panel" role="dialog" aria-modal="true" aria-labelledby="translateModalTitle" id="translateModalPanel">
      <div class="tr-modal-head">
        <h2 id="translateModalTitle">Перевод</h2>
        <button type="button" class="cat-modal-close" id="closeTranslateSettingsBtn" aria-label="Закрыть">&times;</button>
      </div>
      <div class="tr-modal-body">
        <p class="cat-settings-hint">Под названием показывается перевод (ИИ). Нужен тот же бэкенд, что и для отделов.</p>
        <label class="tr-modal-row">
          <input type="checkbox" id="translateOn">
          <span>Включить перевод названий</span>
        </label>
        <div class="tr-modal-row-select">
          <span class="tr-modal-label">Язык</span>
          <select id="translateLang" aria-label="Язык перевода">
            <option value="de">Немецкий</option>
            <option value="en">Английский</option>
            <option value="es">Испанский</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* Classification API:
   - Если задан CLASSIFY_API_BASE (Worker) — всегда он (и на localhost со статикой: Live Server и т.д.).
   - Если пусто и localhost — same-origin /api/... → npm run dev + server.js.
   - GitHub Pages: задайте CLASSIFY_API_BASE на Worker; ключ только в wrangler secret. */

/* '' = только локальный Node (server.js, /api), без Worker — удобно для отладки */
var CLASSIFY_API_BASE = 'https://ai-groceries-classify.bulatbeltone.workers.dev';

/** Поставь true, чтобы видеть в консоли цепочку [gr7:translate] */
var TRANSLATE_DEBUG = false;

function trDbg() {
  if (!TRANSLATE_DEBUG || typeof console === 'undefined' || !console.log) return;
  var msg = Array.prototype.slice.call(arguments);
  msg.unshift('[gr7:translate]');
  console.log.apply(console, msg);
}

function isLocalDevHost() {
  var h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return true;
  /* IPv6 loopback — иначе classifyEndpoint() может остаться пустым */
  if (h === '[::1]' || h === '::1') return true;
  return false;
}

/** База без завершающего /; пустая строка = только локальный /api */
function remoteApiBase() {
  var base = typeof CLASSIFY_API_BASE === 'string' ? CLASSIFY_API_BASE.replace(/^\s+|\s+$/g, '').replace(/\/$/, '') : '';
  return base || '';
}

function classifyEndpoint() {
  var remote = remoteApiBase();
  if (remote) return remote + '/api/classify';
  if (isLocalDevHost()) return '/api/classify';
  return '';
}

function translateEndpoint() {
  var remote = remoteApiBase();
  if (remote) return remote + '/api/translate';
  if (isLocalDevHost()) return '/api/translate';
  return '';
}

/** Первая буква — заглавная, остальное в нижнем регистре (для списка продуктов). */
function prettyProductName(s) {
  s = String(s).replace(/^\s+|\s+$/g, '');
  if (!s) return s;
  var lower = s.toLowerCase();
  var first = lower.charAt(0).toUpperCase();
  return first + lower.slice(1);
}

var translateOn = false;
var translateLang = 'en';

var DEFAULT_CATS = [
  {id:'produce',   name:'Овощи и фрукты',     icon:'🥬'},
  {id:'dairy',     name:'Молочное и яйца',    icon:'🥛'},
  {id:'meat',      name:'Мясо и рыба',        icon:'🥩'},
  {id:'bakery',    name:'Хлеб и выпечка',     icon:'🍞'},
  {id:'frozen',    name:'Заморозка',           icon:'🧊'},
  {id:'drinks',    name:'Напитки',             icon:'🥤'},
  {id:'pantry',    name:'Бакалея и консервы',  icon:'🫙'},
  {id:'snacks',    name:'Сладкое и снеки',    icon:'🍫'},
  {id:'spices',    name:'Специи и соусы',     icon:'🌶️'},
  {id:'household', name:'Бытовая химия',      icon:'🧹'},
  {id:'hygiene',   name:'Гигиена',            icon:'🧴'},
  {id:'other',     name:'Разное',             icon:'🛒'}
];

/** @type {{id:string,name:string,icon:string}[]} */
var CATS = [];
var catIdSeq = 0;

var items = [];
var hist  = [];
var uid   = 0;

function cloneCats(src) {
  var out = [];
  for (var i = 0; i < src.length; i++) {
    out.push({ id: src[i].id, name: src[i].name, icon: src[i].icon || '📦' });
  }
  return out;
}

function nextUniqueCatId() {
  var id;
  do {
    catIdSeq++;
    id = 'cat_' + catIdSeq;
  } while (arrFind(CATS, function(c) { return c.id === id; }));
  return id;
}

function fallbackCatId() {
  var o = arrFind(CATS, function(c) { return c.id === 'other'; });
  if (o) return 'other';
  return CATS.length ? CATS[0].id : 'other';
}

function catById(id) {
  var found = arrFind(CATS, function(ch) { return ch.id === id; });
  if (found) return found;
  var fb = fallbackCatId();
  return arrFind(CATS, function(ch) { return ch.id === fb; }) || CATS[0];
}

function remapItemsFromDeletedCat(deletedId) {
  var to = null;
  var i;
  for (i = 0; i < CATS.length; i++) {
    if (CATS[i].id !== deletedId && CATS[i].id === 'other') {
      to = 'other';
      break;
    }
  }
  if (to === null) {
    for (i = 0; i < CATS.length; i++) {
      if (CATS[i].id !== deletedId) {
        to = CATS[i].id;
        break;
      }
    }
  }
  if (to === null) return;
  for (i = 0; i < items.length; i++) {
    if (items[i].catId === deletedId) items[i].catId = to;
  }
}

function normalizeItemCats() {
  var ids = {};
  for (var i = 0; i < CATS.length; i++) ids[CATS[i].id] = true;
  if (!CATS.length) return;
  var fb = fallbackCatId();
  for (var j = 0; j < items.length; j++) {
    if (items[j].pending) continue;
    if (!items[j].catId || !ids[items[j].catId]) items[j].catId = fb;
  }
}

/* ── utils: no find/findIndex/includes ──────────────────────── */
function arrFind(arr, fn) {
  for (var i = 0; i < arr.length; i++) { if (fn(arr[i])) return arr[i]; }
  return null;
}
function arrFindIndex(arr, fn) {
  for (var i = 0; i < arr.length; i++) { if (fn(arr[i])) return i; }
  return -1;
}
function strContains(str, sub) {
  return str.indexOf(sub) !== -1;
}
function domContains(parent, child) {
  var node = child;
  while (node) { if (node === parent) return true; node = node.parentNode; }
  return false;
}

/* ── storage ────────────────────────────────────────────────── */
/** В localStorage не кладём служебные флаги — иначе после перезагрузки перевод мог не запрашиваться */
function itemsForStorage() {
  var out = [];
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var o = {};
    for (var k in it) {
      if (!Object.prototype.hasOwnProperty.call(it, k)) continue;
      if (k === '_trFetching' || k === 'trPending') continue;
      o[k] = it[k];
    }
    out.push(o);
  }
  return out;
}

function normalizeItemsAfterLoad() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    it._trFetching = false;
    it.trPending = false;
    if (it.tr == null) it.tr = '';
    else it.tr = String(it.tr);
    if (it.trLang != null && it.trLang !== 'de' && it.trLang !== 'en' && it.trLang !== 'es') {
      it.trLang = null;
    }
  }
}

function load() {
  try {
    var s = localStorage.getItem('gr7');
    if (s) {
      var d = JSON.parse(s);
      items = d.items || [];
      hist = d.hist || [];
      uid = d.uid || 0;
      catIdSeq = d.catIdSeq || 0;
      translateOn = !!d.translateOn;
      translateLang = d.translateLang === 'de' || d.translateLang === 'en' || d.translateLang === 'es' ? d.translateLang : 'en';
      if (d.cats && d.cats.length) {
        CATS = cloneCats(d.cats);
      } else {
        CATS = cloneCats(DEFAULT_CATS);
      }
    } else {
      CATS = cloneCats(DEFAULT_CATS);
      translateOn = false;
      translateLang = 'en';
    }
  } catch(e) {
    items = [];
    hist = [];
    uid = 0;
    catIdSeq = 0;
    translateOn = false;
    translateLang = 'en';
    CATS = cloneCats(DEFAULT_CATS);
  }
  normalizeItemsAfterLoad();
  normalizeItemCats();
  if (TRANSLATE_DEBUG) {
    trDbg('load()', {
      items: items.length,
      translateOn: translateOn,
      translateLang: translateLang,
      firstItem: items[0]
        ? { id: items[0].id, name: items[0].name, tr: items[0].tr, trLang: items[0].trLang }
        : null,
    });
  }
  save();
  render();
  renderCatSettings();
}
function save() {
  try {
    localStorage.setItem('gr7', JSON.stringify({
      items: itemsForStorage(),
      hist: hist,
      uid: uid,
      cats: CATS,
      catIdSeq: catIdSeq,
      translateOn: translateOn,
      translateLang: translateLang
    }));
  } catch(e) {}
}

/* ── suggestions ────────────────────────────────────────────── */
function updateSuggestions(val) {
  var box = document.getElementById('suggestions');
  if (!val || val.length < 1) { box.style.display = 'none'; return; }
  var lv = val.toLowerCase();
  var matches = [];
  for (var i = 0; i < hist.length; i++) {
    if (strContains(hist[i].name.toLowerCase(), lv)) matches.push(hist[i]);
    if (matches.length >= 5) break;
  }
  if (!matches.length) { box.style.display = 'none'; return; }
  var html = '';
  for (var j = 0; j < matches.length; j++) {
    var h = matches[j];
    var ex = arrFind(items, function(i) { return i.name.toLowerCase() === h.name.toLowerCase(); });
    var badge = '';
    if (ex && ex.checked) badge = '<span class="badge badge-reuse">&#x21A9; купить снова</span>';
    else if (ex && !ex.checked) badge = '<span class="badge badge-inlist">в списке</span>';
    html += '<div class="suggestion" data-sug="' + encodeURIComponent(h.name) + '">' + h.name + badge + '</div>';
  }
  box.innerHTML = html;
  box.style.display = 'block';
  wiresuggestions();
}

function wiresuggestions() {
  var divs = document.getElementById('suggestions').childNodes;
  for (var i = 0; i < divs.length; i++) {
    (function(el) {
      el.onclick = function() {
        var name = decodeURIComponent(el.getAttribute('data-sug'));
        document.getElementById('inp').value = '';
        hideSug();
        handleAdd(name);
      };
    })(divs[i]);
  }
}

function hideSug() { document.getElementById('suggestions').style.display = 'none'; }

/* ── add ────────────────────────────────────────────────────── */
function doAdd() {
  var inp = document.getElementById('inp');
  var v = inp.value.replace(/^\s+|\s+$/g, '');
  if (!v) return;
  hideSug();
  var parts = v.split(/[,;]/);
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i].replace(/^\s+|\s+$/g, '');
    if (p) handleAdd(p);
  }
  inp.value = '';
}

function handleAdd(name) {
  name = prettyProductName(name.replace(/^\s+|\s+$/g, ''));
  if (!name) return;

  var existing = arrFind(items, function(i) { return i.name.toLowerCase() === name.toLowerCase(); });
  if (existing) {
    if (existing.checked) {
      existing.checked = false;
      existing.checkedAt = null;
      existing.addedAt = Date.now();
      save(); render();
    }
    return;
  }

  var item = {
    id: uid++,
    name: name,
    checked: false,
    catId: null,
    pending: true,
    addedAt: Date.now(),
    checkedAt: null,
    tr: '',
    trLang: null,
    trPending: false,
    _trFetching: false
  };
  items.unshift(item);

  var inHist = arrFind(hist, function(h) { return h.name.toLowerCase() === name.toLowerCase(); });
  if (!inHist) hist.push({name: name});

  save(); render();
  classify(item);
}

/* ── AI classify (local server or Cloudflare Worker — key never in the page) ─ */
function classify(item) {
  if (location.protocol === 'file:') {
    var i0 = arrFindIndex(items, function(x) { return x.id === item.id; });
    if (i0 !== -1 && items[i0].pending) {
      items[i0].catId = catById('other').id;
      items[i0].pending = false;
    }
    save(); render();
    return;
  }

  var url = classifyEndpoint();
  if (!url) {
    var i1 = arrFindIndex(items, function(x) { return x.id === item.id; });
    if (i1 !== -1 && items[i1].pending) {
      items[i1].catId = catById('other').id;
      items[i1].pending = false;
    }
    save(); render();
    return;
  }

  var catsPayload = [];
  for (var c = 0; c < CATS.length; c++) {
    catsPayload.push({ id: CATS[c].id, name: CATS[c].name });
  }

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: item.name, categories: catsPayload }),
  })
    .then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok && typeof console !== 'undefined' && console.warn) {
          console.warn('[classify] HTTP', r.status, data && data.error ? data.error : '');
        }
        return data;
      });
    })
    .then(function(data) {
      if (data && data.error && typeof console !== 'undefined' && console.warn) {
        console.warn('[classify]', data.error);
      }
      var idx = arrFindIndex(items, function(x) { return x.id === item.id; });
      if (idx === -1) return;
      if (!items[idx].pending) return;
      var catId = data.catId || 'other';
      var cat = catById(catId);
      items[idx].catId = cat.id;
      items[idx].pending = false;
      save(); render();
    })
    .catch(function(err) {
      if (typeof console !== 'undefined' && console.warn) console.warn('[classify] request failed', err);
      var idx2 = arrFindIndex(items, function(x) { return x.id === item.id; });
      if (idx2 !== -1 && items[idx2].pending) {
        items[idx2].catId = catById('other').id;
        items[idx2].pending = false;
      }
      save(); render();
    });
}

/* ── render ─────────────────────────────────────────────────── */
function sortItems(arr) {
  var yes = [], no = [];
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].checked) no.push(arr[i]); else yes.push(arr[i]);
  }
  yes.sort(function(a, b) { return b.addedAt - a.addedAt; });
  no.sort(function(a, b) { return (a.checkedAt || 0) - (b.checkedAt || 0); });
  return yes.concat(no);
}

function renderItem(item) {
  var opts = '';
  if (item.pending && !item.catId) {
    opts += '<option value="" selected disabled>Отдел\u2026</option>';
  }
  for (var c = 0; c < CATS.length; c++) {
    var cat = CATS[c];
    var sel = item.catId === cat.id ? ' selected' : '';
    opts += '<option value="' + escapeHtml(cat.id) + '"' + sel + '>' + escapeHtml(cat.name) + '</option>';
  }

  var trBlock = '';
  if (translateOn) {
    if (item.trPending) {
      trBlock = '<div class="item-tr item-tr-pending">\u2026</div>';
    } else if (item.tr) {
      trBlock = '<div class="item-tr">' + escapeHtml(item.tr) + '</div>';
    }
  }

  var catAria = '\u041e\u0442\u0434\u0435\u043b';
  if (item.pending && !item.catId) {
    catAria = '\u0412\u044b\u0431\u0440\u0430\u0442\u044c \u043e\u0442\u0434\u0435\u043b';
  } else {
    var curCat = arrFind(CATS, function(ch) { return ch.id === item.catId; });
    if (curCat) catAria = '\u041e\u0442\u0434\u0435\u043b: ' + curCat.name;
  }

  return '<div class="item' + (item.pending ? ' pending' : '') + '" id="item-' + item.id + '">'
    + '<label class="cb-wrap">'
    + '<input type="checkbox" data-id="' + item.id + '"' + (item.checked ? ' checked' : '') + '>'
    + '<span class="cb-ring"></span>'
    + '</label>'
    + '<div class="item-main">'
    + '<span class="item-name' + (item.checked ? ' done' : '') + '" data-toggle="' + item.id + '">' + escapeHtml(item.name) + '</span>'
    + trBlock
    + '</div>'
    + '<select class="item-cat" data-cat-pick="' + item.id + '" aria-label="' + escapeHtml(catAria) + '" title="' + escapeHtml(catAria) + '">' + opts + '</select>'
    + '<button class="item-del" type="button" data-del="' + item.id + '">&#215;</button>'
    + '</div>';
}

function render() {
  var lists = document.getElementById('lists');
  var html = '';
  var pending = [];
  for (var i = 0; i < items.length; i++) { if (items[i].pending) pending.push(items[i]); }

  if (pending.length) {
    html += '<div class="section"><div class="sec-head"><span class="sec-icon">&#8987;</span>'
      + '<span class="sec-name">Определяю\u2026</span></div><div class="sec-body">';
    var sp = sortItems(pending);
    for (var p = 0; p < sp.length; p++) html += renderItem(sp[p]);
    html += '</div></div>';
  }

  for (var c = 0; c < CATS.length; c++) {
    var cat = CATS[c];
    var ci = [];
    for (var k = 0; k < items.length; k++) {
      if (!items[k].pending && items[k].catId === cat.id) ci.push(items[k]);
    }
    if (!ci.length) continue;
    var si = sortItems(ci);
    html += '<div class="section"><div class="sec-head">'
      + '<span class="sec-icon">' + cat.icon + '</span>'
      + '<span class="sec-name">' + cat.name + '</span>'
      + '<span class="sec-count">' + ci.length + '</span>'
      + '</div><div class="sec-body">';
    for (var q = 0; q < si.length; q++) html += renderItem(si[q]);
    html += '</div></div>';
  }

  if (!items.length) {
    html = '<div class="empty"><div class="icon">&#128722;</div><p>Добавь первый продукт<br>и ИИ разложит по отделам</p></div>';
  }

  lists.innerHTML = html;
  document.getElementById('footer').style.display = items.length ? 'block' : 'none';
  wireItems();
  syncTranslateUi();
  setTimeout(function() { syncTranslations(); }, 0);
}

function syncTranslateUi() {
  var cb = document.getElementById('translateOn');
  var sel = document.getElementById('translateLang');
  if (cb) cb.checked = translateOn;
  if (sel) sel.value = translateLang;
  var badge = document.getElementById('translateStatusBadge');
  var trBtn = document.getElementById('openTranslateSettingsBtn');
  var langShort = { de: 'DE', en: 'EN', es: 'ES' };
  if (badge) {
    badge.textContent = translateOn ? ('вкл · ' + (langShort[translateLang] || 'EN')) : 'выкл';
  }
  if (trBtn) {
    trBtn.className = translateOn ? 'btn-tr-settings is-on' : 'btn-tr-settings';
  }
}

function translationTextNonEmpty(tr) {
  return !!(tr && String(tr).replace(/^\s+|\s+$/g, '').length);
}

function syncTranslations() {
  var url = translateEndpoint();
  var remote = remoteApiBase();
  trDbg('syncTranslations()', {
    translateOn: translateOn,
    translateLang: translateLang,
    url: url || '(пусто)',
    protocol: location.protocol,
    hostname: location.hostname,
    CLASSIFY_API_BASE: remote || '(пусто — будет только /api на localhost)',
    items: items.length,
  });

  if (!translateOn) {
    trDbg('стоп: translateOn = false');
    return;
  }
  if (!url || location.protocol === 'file:') {
    trDbg('стоп: нет URL или открыто как file:// — сеть к API не уйдёт', { url: url, file: location.protocol === 'file:' });
    return;
  }

  var started = false;
  var nSkipFetch = 0;
  var nSkipCached = 0;
  var nSkipStale = 0;
  for (var j = 0; j < items.length; j++) {
    var item = items[j];
    if (item._trFetching) {
      nSkipFetch++;
      continue;
    }
    var hasTr = translationTextNonEmpty(item.tr);
    /* Уже сохранён перевод для этого языка — не дублировать запрос */
    if (hasTr && item.trLang === translateLang) {
      nSkipCached++;
      continue;
    }
    /* Уже был ответ для языка, но пустой/ошибка — не зацикливать */
    if (item.trLang === translateLang && !hasTr) {
      nSkipStale++;
      continue;
    }
    started = true;
    (function(it) {
      trDbg('→ fetch', { id: it.id, name: it.name, lang: translateLang, url: url });
      it._trFetching = true;
      it.trPending = true;
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: it.name, lang: translateLang }),
        mode: 'cors',
        credentials: 'omit',
      })
        .then(function(r) {
          return r.text().then(function(text) {
            if (r.status === 404) {
              throw new Error(
                '404: на Worker нет POST /api/translate (старая сборка). В корне репозитория: npx wrangler deploy'
              );
            }
            var data;
            try {
              data = text ? JSON.parse(text) : {};
            } catch (e) {
              throw new Error('translate: ответ не JSON (HTTP ' + r.status + '): ' + (text || '').slice(0, 80));
            }
            if (!r.ok && typeof console !== 'undefined' && console.warn) {
              console.warn('[translate] HTTP', r.status, data && data.error ? data.error : String(text || '').slice(0, 120));
            }
            return data;
          });
        })
        .then(function(data) {
          if (data && data.error && typeof console !== 'undefined' && console.warn) {
            console.warn('[translate]', data.error);
          }
          var raw = data && data.text != null ? String(data.text) : '';
          it.tr = raw.replace(/^\s+|\s+$/g, '');
          it.trLang = translateLang;
          it.trPending = false;
          it._trFetching = false;
          trDbg('✓ ok', { id: it.id, trLang: it.trLang, trLen: it.tr.length, preview: it.tr.slice(0, 60) });
          save(); render();
        })
        .catch(function(err) {
          if (typeof console !== 'undefined' && console.warn) console.warn('[translate] request failed', err);
          trDbg('✗ catch', { id: it.id, error: String(err && err.message ? err.message : err) });
          it.trPending = false;
          it._trFetching = false;
          it.tr = '';
          it.trLang = translateLang;
          save(); render();
        });
    })(item);
  }
  trDbg('итог цикла', {
    queuedFetch: started,
    skip_inFlight: nSkipFetch,
    skip_cached: nSkipCached,
    skip_emptyStale: nSkipStale,
  });
  if (started) {
    save(); render();
  }
}

function setItemCategory(itemId, catId) {
  if (!catId) return;
  var item = arrFind(items, function(i) { return i.id === itemId; });
  if (!item) return;
  item.catId = catId;
  item.pending = false;
  save(); render();
}

function escapeHtml(t) {
  return String(t)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderCatSettings() {
  var box = document.getElementById('catEditor');
  if (!box) return;
  var rows = '';
  for (var i = 0; i < CATS.length; i++) {
    var c = CATS[i];
    rows += '<div class="cat-row" data-cat-id="' + escapeHtml(c.id) + '">'
      + '<input type="text" class="cat-emoji" maxlength="8" aria-label="Эмодзи" value="' + escapeHtml(c.icon) + '">'
      + '<input type="text" class="cat-name" maxlength="120" aria-label="Название категории" value="' + escapeHtml(c.name) + '">'
      + '<span class="cat-id-label" title="' + escapeHtml(c.id) + '">' + escapeHtml(c.id) + '</span>'
      + '<button type="button" class="btn-cat-del" aria-label="Удалить"' + (CATS.length <= 1 ? ' disabled' : '') + '>&#215;</button>'
      + '</div>';
  }
  box.innerHTML = rows;
  wireCatSettings();
}

function wireCatSettings() {
  var box = document.getElementById('catEditor');
  if (!box) return;
  var rows = box.querySelectorAll('.cat-row');
  for (var r = 0; r < rows.length; r++) {
    (function(row) {
      var cid = row.getAttribute('data-cat-id');
      var emojiInp = row.querySelector('.cat-emoji');
      var nameInp = row.querySelector('.cat-name');
      var delBtn = row.querySelector('.btn-cat-del');

      function syncEmoji() {
        var idx = arrFindIndex(CATS, function(c) { return c.id === cid; });
        if (idx === -1) return;
        var v = emojiInp.value.replace(/^\s+|\s+$/g, '') || '📦';
        CATS[idx].icon = v.slice(0, 8);
        emojiInp.value = CATS[idx].icon;
        save(); render();
      }
      function syncName() {
        var idx = arrFindIndex(CATS, function(c) { return c.id === cid; });
        if (idx === -1) return;
        var v = nameInp.value.replace(/^\s+|\s+$/g, '');
        CATS[idx].name = v || 'Без названия';
        nameInp.value = CATS[idx].name;
        save(); render();
      }

      emojiInp.onchange = syncEmoji;
      emojiInp.onblur = syncEmoji;
      nameInp.onchange = syncName;
      nameInp.onblur = syncName;

      delBtn.onclick = function() {
        if (CATS.length <= 1) return;
        var idx = arrFindIndex(CATS, function(c) { return c.id === cid; });
        if (idx === -1) return;
        remapItemsFromDeletedCat(cid);
        var next = [];
        for (var i = 0; i < CATS.length; i++) { if (i !== idx) next.push(CATS[i]); }
        CATS = next;
        save(); render(); renderCatSettings();
      };
    })(rows[r]);
  }
}

function isCatModalOpen() {
  var modal = document.getElementById('catModal');

}

function isTranslateModalOpen() {
  var modal = document.getElementById('translateModal');

}

function refreshBodyModalLock() {

    document.body.style.overflow = 'hidden';

    document.body.style.overflow = '';
  }
}

function openCatSettings() {

    modal.className = 'cat-modal open';
    modal.setAttribute('aria-hidden', 'false');

  refreshBodyModalLock();

function closeCatSettings() {
  var modal = document.getElementById('catModal');
  var btn = document.getElementById('openCatSettingsBtn');
  if (modal) {
    modal.className = 'cat-modal';
    modal.setAttribute('aria-hidden', 'true');
  }

function openTranslateSettings() {

function closeTranslateSettings() {
  var modal = document.getElementById('translateModal');
  var btn = document.getElementById('openTranslateSettingsBtn');
  if (modal) {
    modal.className = 'tr-modal';
    modal.setAttribute('aria-hidden', 'true');
  }
  if (btn) {
    btn.setAttribute('aria-expanded', 'false');
    try { btn.focus(); } catch (e) {}
  }
  refreshBodyModalLock();
}

function addCategoryRow() {
  var id = nextUniqueCatId();
  CATS.push({ id: id, name: 'Новая категория', icon: '📦' });
  save(); render(); renderCatSettings();
  var box = document.getElementById('catEditor');
  if (box) {
    var last = box.querySelector('.cat-row:last-child .cat-name');
    if (last) { last.focus(); last.select(); }
  }
}

function wireItems() {
  var cbs = document.querySelectorAll('.cb-wrap input[type=checkbox]');
  for (var i = 0; i < cbs.length; i++) {
    (function(cb) {
      cb.onchange = function() { toggleCheck(parseInt(cb.getAttribute('data-id'), 10)); };
    })(cbs[i]);
  }
  var names = document.querySelectorAll('[data-toggle]');
  for (var j = 0; j < names.length; j++) {
    (function(el) {
      el.onclick = function() { toggleCheck(parseInt(el.getAttribute('data-toggle'), 10)); };
    })(names[j]);
  }
  var dels = document.querySelectorAll('[data-del]');
  for (var d = 0; d < dels.length; d++) {
    (function(btn) {
      btn.onclick = function(e) { e.stopPropagation(); deleteItem(parseInt(btn.getAttribute('data-del'), 10)); };
    })(dels[d]);
  }
  var sels = document.querySelectorAll('select.item-cat');
  for (var s = 0; s < sels.length; s++) {
    (function(sel) {
      sel.onchange = function() {
        var id = parseInt(sel.getAttribute('data-cat-pick'), 10);
        var v = sel.value;
        if (!v) return;
        setItemCategory(id, v);
      };
    })(sels[s]);
  }
}

function toggleCheck(id) {
  var item = arrFind(items, function(i) { return i.id === id; });
  if (!item) return;
  item.checked = !item.checked;
  item.checkedAt = item.checked ? Date.now() : null;
  save(); render();
}
function deleteItem(id) {
  var next = [];
  for (var i = 0; i < items.length; i++) { if (items[i].id !== id) next.push(items[i]); }
  items = next;
  save(); render();
}
function clearAll() { items = []; save(); render(); }

/* ── wire top-level events ───────────────────────────────────── */
window.onload = function() {
  var inp = document.getElementById('inp');
  var addBtn = document.getElementById('addBtn');
  var clearBtn = document.getElementById('clearBtn');
  var addCatBtn = document.getElementById('addCatBtn');
  var openCatBtn = document.getElementById('openCatSettingsBtn');
  var closeCatBtn = document.getElementById('closeCatSettingsBtn');
  var catBackdrop = document.getElementById('catModalBackdrop');
  var catPanel = document.getElementById('catModalPanel');

  addBtn.onclick = doAdd;
  clearBtn.onclick = clearAll;
  if (addCatBtn) addCatBtn.onclick = addCategoryRow;
  if (openCatBtn) openCatBtn.onclick = function() { openCatSettings(); };
  if (closeCatBtn) closeCatBtn.onclick = function() { closeCatSettings(); };
  if (catBackdrop) catBackdrop.onclick = function() { closeCatSettings(); };
  if (catPanel) {
    catPanel.onclick = function(e) { e.stopPropagation(); };
  }

  document.onkeydown = function(e) {
    var key = e.key || e.keyCode;
    if (key === 'Escape' || key === 27) {
      if (isTranslateModalOpen()) {
        e.preventDefault();
        closeTranslateSettings();
      } else if (isCatModalOpen()) {
        e.preventDefault();
        closeCatSettings();
      }
    }
  };

  var openTrBtn = document.getElementById('openTranslateSettingsBtn');
  var closeTrBtn = document.getElementById('closeTranslateSettingsBtn');
  var trBackdrop = document.getElementById('translateModalBackdrop');
  var trPanel = document.getElementById('translateModalPanel');
  if (openTrBtn) openTrBtn.onclick = function() { openTranslateSettings(); };
  if (closeTrBtn) closeTrBtn.onclick = function() { closeTranslateSettings(); };
  if (trBackdrop) trBackdrop.onclick = function() { closeTranslateSettings(); };
  if (trPanel) {
    trPanel.onclick = function(e) { e.stopPropagation(); };
  }

  var trOn = document.getElementById('translateOn');
  var trLang = document.getElementById('translateLang');
  if (trOn) {
    trOn.onchange = function() {
      translateOn = !!trOn.checked;
      /* После неудачного запроса оставался trLang без текста — снова не дергали API */
      if (translateOn) {
        for (var ti = 0; ti < items.length; ti++) {
          if (!items[ti].tr) {
            items[ti].trLang = null;
            items[ti].trPending = false;
            items[ti]._trFetching = false;
          }
        }
      }
      save();
      render();
      syncTranslateUi();
      if (translateOn) setTimeout(function() { syncTranslations(); }, 0);
    };
  }
  if (trLang) {
    trLang.onchange = function() {
      translateLang = trLang.value || 'en';
      for (var i = 0; i < items.length; i++) {
        items[i].tr = '';
        items[i].trLang = null;
        items[i].trPending = false;
        items[i]._trFetching = false;
      }
      save(); render();
      syncTranslateUi();
      if (translateOn) setTimeout(function() { syncTranslations(); }, 0);
    };
  }

  inp.oninput = function() { updateSuggestions(inp.value); };
  inp.onkeydown = function(e) {
    var key = e.key || e.keyCode;
    if (key === 'Enter' || key === 13) { e.preventDefault(); doAdd(); }
    if (key === 'Escape' || key === 27) hideSug();
  };
  document.onclick = function(e) {
    var area = document.getElementById('suggestions');
    var inp2 = document.getElementById('inp');
    if (!domContains(area, e.target) && e.target !== inp2) hideSug();
  };

  load();
};
</script>

</body>
</html>
